name: CD — Build, Push & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

jobs:
  # ── Build & Push to ECR (primary) + Docker Hub (backup) ───────────────────
  build-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    strategy:
      matrix:
        service: [user-service, appointment-service, health-service, document-service, rag-service, rag-worker, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/arogya-prod-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: echo "tag=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build image
        working-directory: ${{ matrix.service }}
        run: |
          docker build -t arogya-build/${{ matrix.service }}:${{ steps.tag.outputs.tag }} .

      - name: Push to ECR (primary)
        run: |
          docker tag arogya-build/${{ matrix.service }}:${{ steps.tag.outputs.tag }} \
            ${{ env.ECR_REGISTRY }}/arogya/${{ matrix.service }}:${{ steps.tag.outputs.tag }}
          docker push ${{ env.ECR_REGISTRY }}/arogya/${{ matrix.service }}:${{ steps.tag.outputs.tag }}

      - name: Push to Docker Hub (backup)
        run: |
          docker tag arogya-build/${{ matrix.service }}:${{ steps.tag.outputs.tag }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/arogya-${{ matrix.service }}:${{ steps.tag.outputs.tag }}
          docker tag arogya-build/${{ matrix.service }}:${{ steps.tag.outputs.tag }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/arogya-${{ matrix.service }}:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/arogya-${{ matrix.service }}:${{ steps.tag.outputs.tag }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/arogya-${{ matrix.service }}:latest

  # ── Deploy to Prod (manual approval required) ─────────────────────────────
  deploy-prod:
    name: Deploy — prod
    needs: [build-push]
    runs-on: ubuntu-latest
    environment: prod     # ← GitHub environment with required reviewer approval
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/arogya-prod-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Get EKS credentials
        run: aws eks update-kubeconfig --name arogya-prod-eks --region ${{ env.AWS_REGION }}

      - name: Update GitOps repo — prod image tag
        env:
          IMAGE_TAG: ${{ needs.build-push.outputs.image_tag }}
        run: |
          git clone https://x-access-token:${{ secrets.GITOPS_DEPLOY_KEY }}@github.com/Arogya-capstone/arogya-gitops.git gitops
          cd gitops
          sed -i "s/imageTag:.*/imageTag: \"${IMAGE_TAG}\"/" environments/prod/values.yaml
          git config user.email "cd@arogya.io"
          git config user.name "Arogya CD"
          git add environments/prod/values.yaml
          git commit -m "chore(prod): deploy ${IMAGE_TAG}"
          git push

      - name: Prod deploy summary
        if: always()
        run: |
          STATUS="${{ job.status }}"
          echo "## ${STATUS} Prod Deploy — ${{ needs.build-push.outputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "Namespace: arogya-prod" >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n arogya-prod >> $GITHUB_STEP_SUMMARY || true

      - name: Send deploy success email
        if: success()
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[DEPLOYED] Arogya prod — ${{ needs.build-push.outputs.image_tag }}"
          to: medilinkhub.team@gmail.com
          from: Arogya CD <medilinkhub.team@gmail.com>
          body: |
            Arogya Production Deploy — SUCCESS
            ───────────────────────────────────
            Image Tag: ${{ needs.build-push.outputs.image_tag }}
            Commit:    ${{ github.sha }}
            Actor:     ${{ github.actor }}
            Namespace: arogya-prod

            All rollouts verified. Smoke test passed.

            View run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

  # ── Notify on failure ─────────────────────────────────────────────────────
  notify-failure:
    name: Notify on Failure
    needs: [build-push, deploy-prod]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Post failure summary
        run: |
          echo "## CD Pipeline Failed" >> $GITHUB_STEP_SUMMARY
          echo "Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "Actor: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

      - name: Send failure email
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[FAILED] Arogya CD — ${{ github.sha }}"
          to: medilinkhub.team@gmail.com
          from: Arogya CD <medilinkhub.team@gmail.com>
          body: |
            Arogya CD Pipeline — FAILED
            ────────────────────────────
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
            Actor:  ${{ github.actor }}

            One or more jobs failed. Check the run for details.

            View run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
