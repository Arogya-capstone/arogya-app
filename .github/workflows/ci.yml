name: CI — Build, Test & Scan

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  id-token: write
  contents: read
  security-events: write

jobs:
  # ── Secret Scan ────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── SAST + Dependency Audit ────────────────────────────────────────────────
  sast:
    name: SAST & Dependency Audit
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [user-service, appointment-service, health-service, document-service, rag-service, rag-worker]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        working-directory: ${{ matrix.service }}
        run: pip install bandit pip-audit -r requirements.txt

      - name: Run unit tests
        working-directory: ${{ matrix.service }}
        run: |
          pip install pytest httpx
          pytest test_main.py -v || true

      - name: Bandit SAST
        working-directory: ${{ matrix.service }}
        run: bandit -r . -ll -x ./test_main.py

      - name: pip-audit (dependency vulnerabilities)
        working-directory: ${{ matrix.service }}
        run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2023-62

  # ── Build & Trivy Scan ─────────────────────────────────────────────────────
  build-and-scan:
    name: Build & Scan — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [secret-scan, sast]
    strategy:
      matrix:
        include:
          - service: user-service
            port: 8001
          - service: appointment-service
            port: 8002
          - service: health-service
            port: 8003
          - service: document-service
            port: 8004
          - service: rag-service
            port: 8005
          - service: rag-worker
            port: 0
          - service: frontend
            port: 80
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: ${{ matrix.service }}
        run: docker build -t arogya/${{ matrix.service }}:${{ github.sha }} .

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: arogya/${{ matrix.service }}:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true

      - name: Trivy HIGH warning (no block)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: arogya/${{ matrix.service }}:${{ github.sha }}
          format: table
          exit-code: "0"
          severity: HIGH
          ignore-unfixed: true

  # ── Helm Lint ─────────────────────────────────────────────────────────────
  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: Arogya-capstone/arogya-gitops
          token: ${{ secrets.GITOPS_DEPLOY_KEY }}

      - name: Setup Helm
        uses: azure/setup-helm@v3

      - name: Helm lint — dev
        run: helm lint helm/arogya -f environments/dev/values.yaml

      - name: Helm lint — prod
        run: helm lint helm/arogya -f environments/prod/values.yaml

  # ── Summary ───────────────────────────────────────────────────────────────
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [secret-scan, sast, build-and-scan, helm-lint]
    if: always()
    steps:
      - name: Write summary
        run: |
          echo "## CI Results — ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Scan | ${{ needs.secret-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SAST & Tests | ${{ needs.sast.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build & Trivy | ${{ needs.build-and-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Helm Lint | ${{ needs.helm-lint.result }} |" >> $GITHUB_STEP_SUMMARY
